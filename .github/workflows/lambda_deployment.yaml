name: Deploy Lambda Function Workflow

on:
  push:
    branches:
      - main
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Zip
        run: zip -r function.zip ../openidconnect/src/lambda_function.py
      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::274755515534:role/GitHub
          aws-region: ap-southeast-1
      - name: AWS cli 
        uses: imehedi/actions-awscli-v2@latest
        with:
          args: "lambda update-function-code \
            --function-name arn:aws:lambda:ap-southeast-1:274755515534:function:just_a_test \
            --zip-file fileb://function.zip"

       